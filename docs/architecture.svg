<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif; }
      .lbl { font-size: 19px; font-weight: 700; fill: #444; }
      .lblsub { font-size: 12px; fill: #999; }
      .ct { font-size: 17px; font-weight: 700; }
      .cs { font-size: 12.5px; fill: #666; }
      .mono { font-family: 'SF Mono','Menlo',monospace; font-size: 11px; fill: #8a8f99; }
      .big { font-size: 18px; font-weight: 700; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7a8190"/>
    </marker>
    <marker id="arb" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5B8DEF"/>
    </marker>
    <marker id="arp" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9B7FD4"/>
    </marker>
    <marker id="arg" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4CAF82"/>
    </marker>
  </defs>

  <rect width="1280" height="800" fill="#FAFBFC"/>

  <!-- 标题 -->
  <text x="640" y="48" text-anchor="middle" font-size="30" font-weight="800" fill="#2b2f36">游戏玩家社区“黑话”自动挖掘流水线 <tspan fill="#5B8DEF">v2</tspan></text>
  <text x="640" y="74" text-anchor="middle" font-size="13" fill="#9aa0aa">game-slang-miner · 挖掘 → 三 Agent 串行审查 → 人工审核 → 闭环回灌</text>

  <!-- ===== 输入层 ===== -->
  <text x="30" y="142" class="lbl">输入</text>
  <text x="30" y="160" class="lblsub">data/</text>
  <!-- card1 -->
  <rect x="150" y="98" width="300" height="82" rx="9" fill="#fff" stroke="#E0E3E8"/>
  <rect x="150" y="98" width="300" height="3.5" rx="2" fill="#5B8DEF"/>
  <text x="300" y="128" text-anchor="middle" class="ct" fill="#3a3f47">玩家评论数据</text>
  <text x="300" y="148" text-anchor="middle" class="cs">B站 / 贴吧 / TapTap</text>
  <text x="300" y="166" text-anchor="middle" class="mono">data/samples/comments.jsonl</text>
  <!-- card2 -->
  <rect x="490" y="98" width="300" height="82" rx="9" fill="#fff" stroke="#E0E3E8"/>
  <rect x="490" y="98" width="300" height="3.5" rx="2" fill="#5B8DEF"/>
  <text x="640" y="128" text-anchor="middle" class="ct" fill="#3a3f47">精灵+技能名 过滤表</text>
  <text x="640" y="148" text-anchor="middle" class="cs">公司知识库专有名词(不进候选)</text>
  <text x="640" y="166" text-anchor="middle" class="mono">data/knowledge/entities.csv</text>
  <!-- card3 -->
  <rect x="830" y="98" width="300" height="82" rx="9" fill="#fff" stroke="#E0E3E8"/>
  <rect x="830" y="98" width="300" height="3.5" rx="2" fill="#5B8DEF"/>
  <text x="980" y="128" text-anchor="middle" class="ct" fill="#3a3f47">已确认黑话词典(种子)</text>
  <text x="980" y="148" text-anchor="middle" class="cs">越用越大 · 闭环回灌目标</text>
  <text x="980" y="166" text-anchor="middle" class="mono">data/seeds/known_slang.csv</text>

  <line x1="640" y1="180" x2="640" y2="206" stroke="#7a8190" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- ===== 自动挖掘层 ===== -->
  <text x="30" y="256" class="lbl">自动挖掘</text>
  <text x="30" y="274" class="lblsub">mining/</text>
  <rect x="150" y="212" width="980" height="84" rx="9" fill="#FFF7EF" stroke="#F0C89A"/>
  <rect x="166" y="230" width="62" height="22" rx="5" fill="#E8923A"/>
  <text x="197" y="246" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">算法</text>
  <text x="245" y="246" font-size="16" font-weight="700" fill="#b3671a">N-gram <tspan fill="#caa">·</tspan> PMI(点互信息) <tspan fill="#caa">·</tspan> 左右熵</text>
  <text x="245" y="268" font-size="12.5" fill="#8a7f6f">5万条评论 → 综合打分挑出“长得像黑话”的候选;自动过滤精灵名/技能名/官方术语</text>
  <text x="245" y="286" class="mono" fill="#a89">ngram.py · pmi.py · entropy.py → miner.py(打分+实体过滤)→ 候选词</text>

  <line x1="640" y1="296" x2="640" y2="322" stroke="#7a8190" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- ===== 3 Agent 串行 ===== -->
  <text x="30" y="378" class="lbl">3 Agent</text>
  <text x="30" y="396" class="lblsub">串行审查 · 核心</text>
  <text x="30" y="414" class="lblsub">agents/</text>
  <!-- Agent1 -->
  <rect x="150" y="328" width="300" height="96" rx="9" fill="#fff" stroke="#9CC0F5" stroke-width="1.4"/>
  <rect x="150" y="328" width="300" height="3.5" rx="2" fill="#5B8DEF"/>
  <text x="300" y="356" text-anchor="middle" class="ct" fill="#3b6fd0">Agent 1 · Classifier</text>
  <text x="300" y="378" text-anchor="middle" class="cs">“是不是黑话?” · 7 类分类</text>
  <text x="300" y="408" text-anchor="middle" class="mono">classifier.py</text>
  <!-- Agent2 -->
  <rect x="490" y="328" width="300" height="96" rx="9" fill="#fff" stroke="#C3B0E8" stroke-width="1.4"/>
  <rect x="490" y="328" width="300" height="3.5" rx="2" fill="#9B7FD4"/>
  <text x="640" y="356" text-anchor="middle" class="ct" fill="#7a5fc0">Agent 2 · Definer</text>
  <text x="640" y="378" text-anchor="middle" class="cs">“什么意思?” · 释义 + 原文例句</text>
  <text x="640" y="408" text-anchor="middle" class="mono">definer.py</text>
  <!-- Agent3 -->
  <rect x="830" y="328" width="300" height="96" rx="9" fill="#fff" stroke="#EAA9A9" stroke-width="1.4"/>
  <rect x="830" y="328" width="300" height="3.5" rx="2" fill="#E05D5D"/>
  <text x="980" y="356" text-anchor="middle" class="ct" fill="#cf4a4a">Agent 3 · Reviewer</text>
  <text x="980" y="378" text-anchor="middle" class="cs">“真指代游戏内事物?” 严格兜底</text>
  <text x="980" y="396" text-anchor="middle" class="cs" fill="#cf4a4a">keep / reject</text>
  <text x="980" y="414" text-anchor="middle" class="mono">reviewer.py</text>
  <!-- serial arrows -->
  <line x1="450" y1="376" x2="488" y2="376" stroke="#5B8DEF" stroke-width="2" marker-end="url(#arb)"/>
  <line x1="790" y1="376" x2="828" y2="376" stroke="#9B7FD4" stroke-width="2" marker-end="url(#arp)"/>
  <text x="640" y="442" text-anchor="middle" class="mono" fill="#9aa">编排:pipeline.py 串起三 Agent ｜ 统一入口:cli.py(mine / run / feedback)</text>

  <line x1="640" y1="450" x2="640" y2="476" stroke="#7a8190" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- ===== 输出 + 人工 ===== -->
  <text x="30" y="528" class="lbl">输出+人工</text>
  <text x="30" y="546" class="lblsub">review/</text>
  <rect x="150" y="482" width="478" height="86" rx="9" fill="#fff" stroke="#E0E3E8"/>
  <rect x="150" y="482" width="478" height="3.5" rx="2" fill="#E8923A"/>
  <text x="389" y="514" text-anchor="middle" class="ct" fill="#3a3f47">周报 xlsx</text>
  <text x="389" y="536" text-anchor="middle" class="cs">待人工审核词条 · exporter.py</text>
  <text x="389" y="556" text-anchor="middle" class="mono">outputs/review_*.xlsx</text>

  <rect x="652" y="482" width="478" height="86" rx="9" fill="#fff" stroke="#E0E3E8"/>
  <rect x="652" y="482" width="478" height="3.5" rx="2" fill="#4CAF82"/>
  <text x="891" y="514" text-anchor="middle" class="ct" fill="#3a3f47">人工审核</text>
  <text x="891" y="536" text-anchor="middle" class="cs">填 correct / modified / incorrect</text>
  <text x="891" y="556" text-anchor="middle" class="mono">feedback.py 读回</text>

  <!-- ===== 闭环回灌(虚线) ===== -->
  <path d="M1130 525 H1180 V139 H1132" fill="none" stroke="#4CAF82" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arg)"/>
  <text x="1198" y="320" transform="rotate(90 1198 320)" text-anchor="middle" font-size="13" font-weight="700" fill="#3a9b6e">下轮自动过滤 · Agent 越用越准</text>

  <!-- ===== 底部 highlight ===== -->
  <rect x="150" y="600" width="980" height="120" rx="10" fill="#EEF4FF" stroke="#CBDDF7"/>
  <text x="640" y="640" text-anchor="middle" class="big" fill="#3b6fd0">离线 mock 模式默认零依赖跑通 — 无需任何 API Key</text>
  <text x="640" y="668" text-anchor="middle" font-size="13.5" fill="#5a6470">一条命令端到端:<tspan class="mono" fill="#3b6fd0">python -m slang_miner.cli run</tspan> → 评论 → 候选 → 三 Agent → 审核 xlsx</text>
  <text x="640" y="696" text-anchor="middle" font-size="13.5" fill="#5a6470">真实 LLM(Claude / OpenAI)经环境变量可选接入,显著降噪、释义更准</text>

  <text x="1130" y="762" text-anchor="end" font-size="11.5" fill="#b3b8c0">game-slang-miner · 端到端 30 分钟 (vs 旧版人工 6 小时)</text>
</svg>
