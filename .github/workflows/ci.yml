name: CI

# 在 push 与 PR 到主分支时触发；离线 mock 模式下无需任何 API key / 网络密钥。
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 项目声明 requires-python >=3.9，覆盖 3.9 与较新版本各一。
        python-version: ["3.9", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # editable 安装：同时校验 src 布局 / 控制台脚本 / package 元数据。
          pip install -e .
          pip install pytest

      - name: Smoke test the CLI (offline mock, no API key)
        # 端到端跑一遍 run 子命令，确认离线 mock 模式可独立产出 review xlsx。
        run: slang-miner run

      - name: Run tests
        run: pytest -v
